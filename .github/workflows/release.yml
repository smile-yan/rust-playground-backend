name: Release and Deploy

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-linux-x64:
    name: Build linux-x64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-x86_64-unknown-linux-gnu-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-x86_64-unknown-linux-gnu-cargo-

      - name: Build release binary
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Package binary
        shell: bash
        run: |
          mkdir -p dist
          BINARY="rust-playground-linux-x64"
          cp "target/x86_64-unknown-linux-gnu/release/rust-playground" "dist/${BINARY}"
          cd dist
          sha256sum "${BINARY}" > "${BINARY}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: rust-playground-linux-x64
          path: dist/*
          if-no-files-found: error

  build-cross:
    name: Build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            arch: linux-arm64
            cross: true
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            arch: macos-x64
            cross: false
          - runner: macos-latest
            target: aarch64-apple-darwin
            arch: macos-arm64
            cross: false
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            arch: windows-x64
            cross: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install zig for cross compilation
        if: matrix.cross
        shell: bash
        run: |
          ZIG_VERSION="0.13.0"
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz" -o zig.tar.xz
          tar -xf zig.tar.xz
          sudo mv "zig-linux-x86_64-${ZIG_VERSION}" /usr/local/zig
          sudo ln -sf /usr/local/zig/zig /usr/local/bin/zig
          zig version

      - name: Install cargo-zigbuild
        if: matrix.cross
        run: cargo install cargo-zigbuild

      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build release binary
        shell: bash
        run: |
          if [[ "${{ matrix.cross }}" == "true" ]]; then
            cargo zigbuild --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package binary
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            BINARY="rust-playground-${{ matrix.arch }}.exe"
            cp "target/${{ matrix.target }}/release/rust-playground.exe" "dist/${BINARY}"
          else
            BINARY="rust-playground-${{ matrix.arch }}"
            cp "target/${{ matrix.target }}/release/rust-playground" "dist/${BINARY}"
          fi
          cd dist
          sha256sum "${BINARY}" > "${BINARY}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: rust-playground-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error

  deploy:
    name: Deploy to Cloud Server
    needs: build-linux-x64
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/rust-playground' }}
    steps:
      - name: Validate SSH secrets
        shell: bash
        run: |
          missing=()
          [[ -z "$SSH_HOST" ]] && missing+=("SSH_HOST")
          [[ -z "$SSH_USER" ]] && missing+=("SSH_USER")
          [[ -z "$SSH_PRIVATE_KEY" ]] && missing+=("SSH_PRIVATE_KEY")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            exit 1
          fi

      - name: Download linux-x64 artifact
        uses: actions/download-artifact@v8
        with:
          name: rust-playground-linux-x64
          path: dist

      - name: Setup SSH key and test connectivity
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          echo "=== SSH config ==="
          echo "Host: $SSH_HOST"
          echo "Port: $SSH_PORT"
          echo "User: $SSH_USER"
          echo "Deploy path: $DEPLOY_PATH"
          echo "Key file size: $(stat -c%s ~/.ssh/deploy_key 2>/dev/null || stat -f%z ~/.ssh/deploy_key 2>/dev/null) bytes"

          echo "=== Scanning host key ==="
          ssh-keyscan -H -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>&1 || true

          echo "=== Checking TCP reachability ==="
          if command -v nc >/dev/null 2>&1; then
            nc -vz -w 10 "$SSH_HOST" "$SSH_PORT" || true
          else
            timeout 10 bash -c "</dev/tcp/${SSH_HOST}/${SSH_PORT}" && echo "TCP port is reachable" || echo "TCP port is not reachable"
          fi

          echo "=== Testing SSH connection (verbose, with retries) ==="
          max_attempts=3
          for attempt in $(seq 1 $max_attempts); do
            echo "Attempt $attempt/$max_attempts..."
            if ssh -v -o ConnectTimeout=15 -o StrictHostKeyChecking=accept-new \
                -p "$SSH_PORT" -i ~/.ssh/deploy_key "$SSH_USER@$SSH_HOST" \
                "echo 'SSH connection OK'"; then
              echo "SSH connection succeeded on attempt $attempt"
              exit 0
            fi
            echo "SSH connection attempt $attempt failed"
            if [[ $attempt -lt $max_attempts ]]; then
              echo "Waiting 15 seconds before retry..."
              sleep 15
            fi
          done

          echo "::error::SSH connection test failed after $max_attempts attempts. Please verify SSH_HOST, SSH_PORT, SSH_USER, and SSH_PRIVATE_KEY, and ensure the server is reachable from GitHub Actions runners."

          echo "=== Diagnosing port service ==="
          echo "TCP port is open, but SSH banner was not received. The configured port may not be an SSH service."
          echo "Raw response from host:port (5 second timeout):"
          timeout 5 bash -c "exec 3<>/dev/tcp/${SSH_HOST}/${SSH_PORT}; cat <&3" || true

          echo "=== Checking for HTTP/HTTPS response ==="
          curl -s -o /dev/null -w "HTTP %{http_code}\n" --max-time 5 "http://${SSH_HOST}:${SSH_PORT}/" || true
          curl -s -o /dev/null -w "HTTPS %{http_code}\n" --max-time 5 -k "https://${SSH_HOST}:${SSH_PORT}/" || true

          exit 1

      - name: Copy binary to cloud server
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Copying files via ssh + cat (avoiding scp/sftp) ==="
          for file in dist/rust-playground-linux-x64 dist/rust-playground-linux-x64.sha256; do
            base=$(basename "$file")
            echo "Uploading ${base}..."
            ssh -o StrictHostKeyChecking=accept-new \
              -p "$SSH_PORT" -i ~/.ssh/deploy_key "$SSH_USER@$SSH_HOST" \
              "cat > \${DEPLOY_PATH}/${base}" < "$file"
            echo "Uploaded ${base}"
          done

          echo "=== Verifying remote files ==="
          ssh -o StrictHostKeyChecking=accept-new \
            -p "$SSH_PORT" -i ~/.ssh/deploy_key "$SSH_USER@$SSH_HOST" \
            "ls -lh \${DEPLOY_PATH}/rust-playground-linux-x64 \${DEPLOY_PATH}/rust-playground-linux-x64.sha256"

      - name: Restart service on cloud server
        shell: bash
        run: |
          set -euo pipefail
          ssh -o StrictHostKeyChecking=accept-new \
            -p "$SSH_PORT" -i ~/.ssh/deploy_key "$SSH_USER@$SSH_HOST" << EOF
          set -euo pipefail

          APP_DIR="$DEPLOY_PATH"
          cd "\${APP_DIR}"

          # Verify checksum before renaming
          if [ -f "rust-playground-linux-x64.sha256" ]; then
            sha256sum -c rust-playground-linux-x64.sha256
          fi

          # Rename binary to standard name
          mv rust-playground-linux-x64 rust-playground
          chmod +x rust-playground

          # Ensure Rust toolchain is available (required to compile user code)
          if ! command -v rustc &>/dev/null; then
            echo "Installing Rust toolchain..."
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
            source "\$HOME/.cargo/env"
          fi
          rustup target add wasm32-wasip1 2>/dev/null || true

          # Restart the service if it exists
          if systemctl list-unit-files | grep -q "^rust-playground.service"; then
            sudo systemctl daemon-reload
            sudo systemctl restart rust-playground
            sudo systemctl is-active --quiet rust-playground && echo "Service is running"
          else
            echo "Service rust-playground.service not found; binary deployed to \${APP_DIR}/rust-playground"
          fi

          echo "Deployment completed: \${GITHUB_REF_NAME}"
          EOF

  release:
    name: Create GitHub Release
    needs: [build-linux-x64, build-cross]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js (latest)
        uses: actions/setup-node@v7
        with:
          node-version: 'latest'

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: rust-playground-*
          merge-multiple: true

      - name: Verify artifacts with Node.js
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const files = fs.readdirSync('dist');
            console.log('Artifacts to release:');
            files.forEach(f => {
              const stat = fs.statSync(path.join('dist', f));
              console.log(' - ' + f + ' (' + stat.size + ' bytes)');
            });
          "

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
